object_mappings:
  clusters:
    source_api: vmware
    destination_api: netbox
    destination_endpoint: virtualization.clusters
    fetch_data_function: get_clusters
    fetch_data_args: []
    mapping:
      name: 
        source: name
        transform_function: "regex_replace('Cluster-(.*)', '\\1 Cluster')"
      status: 
        source: status
      site: 
        source: siteName
        transform_function: "lookup_field('sites', 'siteName')"
      type: 
        source: "VMware Cluster"
      total_cpu: 
        source: totalCpu
      total_memory_mb: 
        source: totalMemoryMB

  hosts:
    source_api: vmware
    destination_api: netbox
    destination_endpoint: dcim.devices
    fetch_data_function: get_hosts
    fetch_data_args: []
    mapping:
      name: 
        source: name
        transform_function: "regex_replace('(.*)-esx', '\\1')"
      status: 
        source: runtime.connectionState
      cpu_count: 
        source: hardware.cpuInfo.numCpuPackages
      memory_size_mb: 
        source: hardware.memorySizeMB
      cluster: 
        source: parent.name
        transform_function: "lookup_field('clusters', 'name')"

  virtual_machines:
    source_api: vmware
    destination_api: netbox
    destination_endpoint: virtualization.virtual_machines
    fetch_data_function: get_vms
    fetch_data_args: []
    mapping:
      name: 
        source: name
        transform_function: "regex_replace('(.*)-vm', '\\1')"
      cluster: 
        source: resourcePool.name
        transform_function: "lookup_field('clusters', 'name')"
      host: 
        source: runtime.host.name
        transform_function: "lookup_field('hosts', 'name')"
      status: 
        source: runtime.powerState
      cpu_count: 
        source: config.hardware.numCPU
      memory_mb: 
        source: config.hardware.memoryMB
      disk_capacity: 
        source: storage.perDatastoreUsage[0].committed
      network: 
        source: guest.net[0].network
      ip_address: 
        source: guest.net[0].ipAddress[0]

  distributed_virtual_switches:
    source_api: vmware
    destination_api: netbox
    destination_endpoint: dcim.devices
    fetch_data_function: get_dvs
    fetch_data_args: []
    mapping:
      name: 
        source: name
        transform_function: "regex_replace('DVS-(.*)', '\\1 DVS')"
      uuid: 
        source: uuid
      num_ports: 
        source: numPorts
      description: 
        source: summary
      status: 
        source: status
      site: 
        source: siteName
        transform_function: "lookup_field('sites', 'siteName')"
      manufacturer: 
        source: "VMware"
      device_type: 
        source: "Virtual Switch"
