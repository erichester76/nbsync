
api_definitions:
  netbox:
    type: api
    base_urls:
      - http://netbox.local/api
      - http://netbox-secondary.local/api
    module: pynetbox
    auth_method: token
    auth_params:
      token: your_netbox_token
    fetch_data_function: dcim.devices.all
    fetch_data_args: []

  snmp_linux:
    type: snmp
    module: pysnmp
    auth_method: snmp_community
    auth_params:
      community_string: public
      targets:
        - 192.168.1.100
      target_ranges:
        - 192.168.2.0/24
    mibs:
      - IF-MIB
      - SNMPv2-MIB
    oid_mapping:
      hostname: SNMPv2-MIB::sysName
      interface_name: IF-MIB::ifDescr
      in_octets: IF-MIB::ifInOctets
      out_octets: IF-MIB::ifOutOctets
      interface_status: IF-MIB::ifOperStatus

object_mappings:
  devices:
    source_api: netbox
    destination_api: netbox
    destination_endpoint: dcim.devices
    mapping:
      name: name
      serial: serial
      model: device_type
      manufacturer: manufacturer
      site: site
      status: status
      rack: rack
      position: position

  interfaces:
    source_api: snmp_linux
    destination_api: netbox
    destination_endpoint: dcim.interfaces
    mapping:
      device: hostname
      name: interface_name
      in_octets: in_octets
      out_octets: out_octets
      status: interface_status
