api_definitions:
  # NetBox API Definition
  netbox: 
    type: api
    module: pynetbox
    auth_method: token
    auth_function: api  
    auth_params:
      token: 25c89f4320476edf29a6cb24a1d2b085b1fd5264
    base_urls:
      - https://netbox.app.clemson.edu

  # VMware API Definition (pyvmomi)
  vmware: 
    type: api
    module: pyVim
    auth_method: login
    auth_function: connect.SmartConnect
    auth_params:
      username: esacollector
      password: Upward-Floral4-Avid
      sslContext: ignore
    auth_args:
      - host
      - username
      - password
      - sslContext
    base_urls:
      - cu-vcenter.clemson.edu
      - poole-vcenter.clemson.edu
      - cudr-vcenter.clemson.edu
      #- proto-vcenter.clemson.edu
      - vdi-vcenter.clemson.edu

object_mappings:

  hosts:
    source_api: vmware
    destination_api: netbox
    destination_endpoint: dcim.devices
    find_function: dcim.devices.filter
    create_function: dcim.devices.create
    update_function: dcim.devices.update
    imports:
      - pyVmomi.vim
    fetch_data_code: |
      def fetch_data(api_client):
          content = api_client.RetrieveContent()
          hosts = content.viewManager.CreateContainerView(content.rootFolder, [vim.HostSystem], True).view
          return hosts

    mapping:

      name:
        source: "name"
        transform_function: regex_replace('.clemson.edu', '')
  
  
      tenant:
        source: "name"
        transform_function: 
          - regex_replace('.*\-gen\-.*', 'Tiger One Card Services')
          - regex_replace('.*\-len\-.*', 'Infrastructure Services & Ops')
          - regex_replace('.*\-core\-.*', 'Infrastructure Services & Ops')
          - regex_replace('.*\-boot\-.*', 'Infrastructure Services & Ops')
          - regex_replace('.*\-vdi\-.*', 'Customer Rel & Learning Tech')
          - regex_replace('.*\d.*', 'Infrastructure Services & Ops')
          - lookup_object('name', 'tenancy.tenants.filter', 'tenancy.tenants.create')

      cluster:
        source: "parent.name"
        transform_function: lookup_object('name', 'virtualization.clusters.filter', 'virtualization.clusters.create')
  
      role: 
        source: str:"Hypervisor Host"
        transform_function: lookup_object('name', 'dcim.device_roles.filter', 'dcim.device_roles.create')

      site:
        source: "parent.name"
        transform_function: 
          - regex_replace('(?i)^CU\-.+','Clemson Information Technology Center')
          - regex_replace('(?i)^CUDR\-.+|^DR\-.+','University of California San Diego')
          - regex_replace('(?i)^Poole\-.+','Poole')
          - regex_replace('(?i)^Proto\-.+','Clemson Information Technology Center')
          - lookup_object('name', 'dcim.sites.filter', 'dcim.sites.create')    
  
      device_type:
        source: "hardware.systemInfo.model"
        transform_function: lookup_object('model', 'dcim.device_types.filter', 'dcim.device_types.create')
        included_fields:
          - field: manufacturer
            key: name
          - field: manufacturer
            key: slug
            create_if_missing: true
            transform_function: slugify    

      status:
        source: "runtime.connectionState"
        transform_function: 
          - regex_replace('connected', 'active')
          - regex_replace('disconnected', 'offline')
  
      serial:
        source: summary.hardware.otherIdentifyingInfo
        transform_function: extract_identifier('SerialNumberTag')  

      platform:
        source: ["config.product.name", "config.product.version"]
        transform_function: 
          - concat(" ")
          - lookup_object('name', 'dcim.platforms.filter', 'dcim.platforms.create')

  virtual_machines:

    source_api: vmware
    destination_api: netbox
    destination_endpoint: virtualization.virtual_machines
    find_function: virtualization.virtual_machines.filter
    create_function: virtualization.virtual_machines.create
    update_function: virtualization.virtual_machines.update
    imports:
      - pyVmomi.vim
    fetch_data_code: |
      def fetch_data(api_client):
          content = api_client.RetrieveContent()
          vms = content.viewManager.CreateContainerView(content.rootFolder, [vim.VirtualMachine], True).view                  
          return vms

    mapping:
      name:
        source: "config.name"

      status:
        source: "runtime.powerState"
        transform_function: 
          - regex_replace('poweredOn', 'active')
          - regex_replace('poweredOff', 'offline')
   
      cluster:
        source: "runtime.host.parent.name"
        transform_function: lookup_object('name', 'virtualization.clusters.filter', 'virtualization.clusters.create')

      host:
        source: "runtime.host.name"
        transform_function: 
          - regex_replace('.clemson.edu', '')
          - lookup_object('name', 'dcim.devices.filter', 'dcim.devices.create')

