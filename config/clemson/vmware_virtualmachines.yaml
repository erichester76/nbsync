  virtual_machines:

    source_api: vmware
    destination_api: netbox
    destination_endpoint: virtualization.virtual_machines
    find_function: virtualization.virtual_machines.filter
    create_function: virtualization.virtual_machines.create
    update_function: virtualization.virtual_machines.update
    imports:
      - pyVmomi.vim
    fetch_data_code: |
      def fetch_data(api_client):
          content = api_client.RetrieveContent()
          vms = content.viewManager.CreateContainerView(content.rootFolder, [vim.VirtualMachine], True).view
          return vms

    mapping:
      name:
        source: "config.name"

      status:
        source: "runtime.powerState"
        transform_function: 
          - regex_replace('poweredOn', 'active')
          - regex_replace('poweredOff', 'offline')
   
      cluster:
        source: "runtime.host.parent.name"
        transform_function: lookup_object('name', 'virtualization.clusters.filter', 'virtualization.clusters.create')

      host:
        source: "runtime.host.name"
        transform_function: 
          - regex_replace('.clemson.edu', '')
          - lookup_object('name', 'dcim.devices.filter', 'dcim.devices.create')

      vcpus:
        source: "config.hardware.numCPU"

      memory:
        source: "config.hardware.memoryMB"

      primary_ip4:
        source: ["guest.ipAddress", "guest.net[0].ipConfig.ipAddress[0].subnetMask"]
        transform_function:
          - concat("/")
          - regex_replace("255.255.255.255", "32")
          - regex_replace("255.255.255.254", "31")
          - regex_replace("255.255.255.252", "30")
          - regex_replace("255.255.255.248", "29")
          - regex_replace("255.255.255.240", "28")
          - regex_replace("255.255.255.224", "27")
          - regex_replace("255.255.255.192", "26")
          - regex_replace("255.255.255.128", "25")
          - regex_replace("255.255.255.0", "24")
          - regex_replace("255.255.254.0", "23")
          - regex_replace("255.255.252.0", "22")
          - regex_replace("255.255.248.0", "21")
          - regex_replace("255.255.240.0", "20")
          - regex_replace("255.255.224.0", "19")
          - regex_replace("255.255.192.0", "18")
          - regex_replace("255.255.128.0", "17")
          - regex_replace("255.255.0.0", "16")
          - lookup_object('address', 'ipam.address.filter', 'ipam.address.create')

      platform:
        source: "config.product.name"
        transform_function: lookup_object('name', 'dcim.platforms.filter', 'dcim.platforms.create')

      serial:
        source: "config.uuid"

      site:
        source: "runtime.host.parent.name"
        transform_function: 
          - regex_replace('^CU\-.+','Clemson Information Technology Center')
          - regex_replace('^CUDR\-.+|^DR\-.+','University of California San Diego')
          - regex_replace('^Poole\-.+','Poole')
          - regex_replace('^Proto\-.+','Clemson Information Technology Center')
          - lookup_object('name', 'dcim.sites.filter', 'dcim.sites.create')