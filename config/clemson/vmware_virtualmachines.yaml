api_definitions:
  # NetBox API Definition
  netbox: 
    type: api
    module: pynetbox
    auth_method: token
    auth_function: api  
    auth_params:
      token: 25c89f4320476edf29a6cb24a1d2b085b1fd5264
    base_urls:
      - https://netbox.app.clemson.edu

  # VMware API Definition (pyvmomi)
  vmware: 
    type: api
    module: pyVim
    auth_method: login
    auth_function: connect.SmartConnect
    auth_params:
      username: esacollector
      password: Upward-Floral4-Avid
      sslContext: ignore
    auth_args:
      - host
      - username
      - password
      - sslContext
    base_urls:
      - cu-vcenter.clemson.edu
      - poole-vcenter.clemson.edu
      - cudr-vcenter.clemson.edu
      - proto-vcenter.clemson.edu
      - vdi-vcenter.clemson.edu

object_mappings:
  virtual_machines:
    source_api: vmware
    destination_api: netbox
    destination_endpoint: virtualization.virtual_machines
    find_function: virtualization.virtual_machines.filter
    create_function: virtualization.virtual_machines.create
    update_function: virtualization.virtual_machines.update
    imports:
      - pyVmomi.vim
    fetch_data_code: |
      def fetch_data(api_client):
          content = api_client.RetrieveContent()
          vms = content.viewManager.CreateContainerView(content.rootFolder, [vim.VirtualMachine], True).view
          return vms
    mapping:
      # Mapping VMware name to NetBox name
      name:
        source: "config.name"

      # Mapping status (VMware power state) to NetBox status
      status:
        source: "runtime.powerState"
        transform_function: 
          - regex_replace('poweredOn', 'active')
          - regex_replace('poweredOff', 'offline')
   
      # Mapping VMware cluster to NetBox cluster (uses lookup to find or create)
      cluster:
        source: "runtime.host.parent.name"
        transform_function: lookup_object('name', 'virtualization.clusters.filter', 'virtualization.clusters.create')

      # Mapping host (VMware host) to NetBox device
      host:
        source: "runtime.host.name"
        transform_function: 
          - regex_replace('.clemson.edu', '')
          - lookup_object('name', 'dcim.devices.filter', 'dcim.devices.create')

      # Mapping CPU count to NetBox vCPUs
      vcpus:
        source: "config.hardware.numCPU"

      # Mapping Memory size in MB to NetBox memory (in MB)
      memory:
        source: "config.hardware.memoryMB"

      # Mapping IP address from VMware Guest Info to NetBox primary IP
      primary_ip4:
        source: "guest.ipAddress"

      # Mapping platform (could be OS type in VMware to NetBox platform)
      platform:
        source: "config.guestFullName"
        transform_function: lookup_object('name', 'dcim.platforms.filter', 'dcim.platforms.create')

      # Serial number from VMware to NetBox serial number (Optional)
      serial:
        source: "config.uuid"
        
      site:
        source: "runtime.host.parent.name"
        transform_function: 
          - regex_replace('^CU\-.+','Clemson Information Technology Center')
          - regex_replace('^CUDR\-.+|^DR\-.+','University of California San Diego')
          - regex_replace('^Poole\-.+','Poole')
          - regex_replace('^Proto\-.+','Clemson Information Technology Center')
          - lookup_object('name', 'dcim.sites.filter', 'dcim.sites.create')