api_definitions:
   # Destination API using pynetbox for NetBox
  netbox:
    type: api
    module: pynetbox
    auth_method: token
    auth_function: api
    auth_args:
      token: ${NETBOX_API_KEY}
    base_urls:
      - https://netbox.example.com

  # Source API using Swagger
  iaw:
    type: api_swagger
    module: bravado.client
    api_spec_url: "https://iaw.dev.clemson.edu:8443/docs/"
    auth_method: login  
    auth_args:
      username: ${IAW_USERNAME}
      password: ${IAW_PASSWORD}



# Object Mappings Configuration
object_mappings:

  devices:
    source_api: iaw
    destination_api: netbox
    destination_endpoint: dcim.devices
    find_function: dcim.devices.filter
    create_function: dcim.devices.create
    update_function: dcim.devices.update
    fetch_data_function: |
      # Custom data fetching function for Bravado source API
      def get_data(client):
          # Example: retrieving devices from the source API
          # Replace `devices` with actual path as per Swagger spec
          response = client.devices.getAllDevices().response().result
          if not response:
              raise ValueError("No devices found from source API.")
          return response

    # Mapping Configuration
    mapping:
      # Map source API field names to NetBox field names
      name:
        source: {{ item.device_name }}
      device_type:
        source: {{ item.device_type }}
        action: lookup_object('model', 'dcim.device_types.filter', 'dcim.device_types.create')
      serial:
        source: {{ item.serial_number | upper }}
      status:
        source: {{ item.operational_status }}
        transform_function:
          - lookup_object('name', 'dcim.device_status.filter', 'dcim.device_status.create')
      site:
        source: {{ item.location }}
        action: lookup_object('name', 'dcim.sites.filter', 'dcim.sites.create')
      platform:
        source: {{ item.platform | upper }}
        action: lookup_object('name', 'dcim.platforms.filter', 'dcim.platforms.create')
