api_definitions:
   # Destination API using pynetbox for NetBox
  netbox:
    type: api
    module: pynetbox
    auth_method: token
    auth_function: api
    auth_args:
      token: ${NETBOX_API_KEY}
    base_urls:
      - https://netbox.example.com

  iaw:  
    type: api-swagger
    module: bravado.client
    auth_method: login
    json_url: /docs/swagger.json  
    auth_args:
      login_endpoint: /login
      token_key: token
      username: ${IAW_USERNAME}
      password: ${IAW_PASSWORD}
    base_urls:
      - https://iaw.dev.clemson.edu:8443/api

# Object Mappings Configuration
object_mappings:

  slas:
    source_api: iaw
    destination_api: netbox
    destination_endpoint: 
    find_function: 
    create_function: 
    update_function: 
    fetch_data_code: |
      def fetch_data(api_client):
            url = f"https://iaw.dev.clemson.edu:8443/api/servers"
            print({api_client.session.headers})
            response = api_client.session.request(
                method="GET",
                url=url,
            )
            response.raise_for_status()  # Raise an error for bad status codes
            return response.json

    # Mapping Configuration
    mapping:
      # Map source API field names to NetBox field names
      name:
        source: {{ name | regex_replace('(.+).clemson.edu.+', '\\1') }}

      custom_fields.sla: 
        source: {{ sla.agreementNumber }} - {{ sla.agreementName }}

      custom_fields.business_contact: 
        source: {{ sla.customerBusinessManagers[0] }}
 
      custom_fields.contact: 
        source: {{ sla.customerPointsofContact[0] }}
    
      custom_fields.technical_contact: 
        source: {{ technicalcontacts[0].fullname }}

  virtualmachines:
    source_api: iaw
    destination_api: netbox
    destination_endpoint: virtualization.virtual_machines
    find_function: virtualization.virtual_machines.filter
    create_function: virtualization.virtual_machines.create
    update_function: virtualization.virtual_machines.update
    fetch_data_function: client.servers.getAllServers().response().result

    # Mapping Configuration
    mapping:
      # Map source API field names to NetBox field names
      name:
        source: {{ name | regex_replace('(.+).clemson.edu.+', '\\1') }}

      custom_fields.sla: 
        source: {{ sla.agreementNumber }} - {{ sla.agreementName }}

      custom_fields.business_contact: 
        source: {{ sla.customerBusinessManagers[0] }}
 
      custom_fields.contact: 
        source: {{ sla.customerPointsofContact[0] }}
    
      custom_fields.technical_contact: 
        source: {{ technicalcontacts[0].fullname }}

      