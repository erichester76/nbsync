api_definitions:
   # Destination API using pynetbox for NetBox
  netbox:
    type: api
    module: pynetbox
    auth_method: token
    auth_function: api
    auth_args:
      token: ${NETBOX_API_KEY}
    base_urls:
      - https://netbox.app.clemson.edu
      
  iaw:  
    type: api-swagger
    module: bravado.client
    auth_method: login
    json_url: /docs/swagger.json  
    auth_args:
      login_endpoint: /login
      token_key: token
      username: ${IAW_USERNAME}
      password: ${IAW_PASSWORD}
    base_urls:
      - https://iaw.dev.clemson.edu:8443/api

# Object Mappings Configuration
object_mappings:

  slas:
    source_api: iaw
    destination_api: netbox
    destination_endpoint: plugins.netbox_servicemgmt.sla
    find_function: plugins.netbox_servicemgmt.sla.filter
    create_function: plugins.netbox_servicemgmt.sla.create
    update_function: plugins.netbox_servicemgmt.sla.update
    fetch_data_code: |
      def fetch_data(api_client):
            url = f"https://iaw.dev.clemson.edu:8443/api/slas"
            response = api_client.session.request(
                method="GET",
                url=url,
            )
            response.raise_for_status()  # Raise an error for bad status codes
            return response.json()

    # {'_id': '666b271cec496524844ff19d', 'agreementNumber': '2026', 'dataRiskCategory': None, 
    # 'status': None, 'agreementName': 'SLA 2026 - Backup Infrastructure', 'servicesProvided': [],
    # 'customerDepartments': ['ISO'], 'ccitDepartments': [], 'customerPointsofContact': ['Jason Davis'], 
    # 'customerBusinessManagers': ['Matt Garrett'], 'dataSummary': None}

    # Mapping Configuration
    mapping:

      name:
        source: {{ agreementName }}
     
      data_classification:
        source: {{ dataRiskCategory | default("public") }}

      business_owner_tenant:
        source: {{ customerDepartments[0] }}

      business_owner_tenant:
        source: {{ customerBusinessManagers[0] }}

      description:
        source: {{ dataSummary }}

      

      