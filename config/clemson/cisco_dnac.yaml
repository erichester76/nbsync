api_definitions:
  # NetBox API Definition
  netbox: 
    type: api
    module: pynetbox
    auth_method: token
    auth_function: api  
    auth_args:
      token: ${NETBOX_API_KEY}
    base_urls:
      - https://netbox.app.clemson.edu

  #Cisco DNA Center API Definition (dnacentersdk)
  dnac: 
    type: api
    module: dnacentersdk
    auth_method: login
    auth_function: DNACenterAPI
    auth_args:
      - name: base_url
        value: base_urls
      - name: username
        value: ${DNAC_AUTH_USER}
      - name: password
        value: ${DNAC_AUTH_PW}
      - name: version
        value: 2.3.3.0
      - name: verify
        value: False

    base_urls:
      - https://cisco-dnac.clemson.edu/

object_mappings:

  devices:
    source_api: dnac
    destination_api: netbox
    destination_endpoint: dcim.devices
    find_function: dcim.devices.filter
    create_function: dcim.devices.create
    update_function: dcim.devices.update
    # Fetch device data from DNAC
    fetch_data_code: |
      def fetch_data(api_client):
          # Retrieve the list of devices from DNAC
          devices = api_client.devices.get_device_list()
          return devices['response']

    mapping:
          
          name:
            source: "hostname"
            
          device_type:
            source: "platformId"
            transform_function: lookup_object('model', 'dcim.device_types.filter', 'dcim.device_types.create')
            included_fields:
              - field: manufacturer
                key: name
              - field: manufacturer
                key: slug
                create_if_missing: true
                transform_function: slugify 

          serial_number:
            source: "serialNumber"

          site:
            source: "locationName"
            transform_function:
              - lookup_object('name', 'dcim.sites.filter', 'dcim.sites.create')

          status:
            source: "reachabilityStatus"
            transform_function:
              - regex_replace('Reachable', 'active')
              - regex_replace('Unreachable', 'offline')

          primary_ip4:
            source: "managementIpAddress"
            transform_function:
              - lookup_object('address', 'ipam.ip_addresses.filter', 'ipam.ip_addresses.create')
